[pytest]
# Transport-agnostic hang backstop: any test that blocks (network, grpc, deadlock, ...) fails with a
# traceback after this many seconds instead of stalling the whole suite indefinitely. `signal` method
# interrupts blocking syscalls (e.g. a stuck socket connect) on the main thread. Pair with the socket
# guard in tests/conftest.py. A slow-but-legitimate test can opt out with @pytest.mark.timeout(N).
timeout = 120
timeout_method = signal
