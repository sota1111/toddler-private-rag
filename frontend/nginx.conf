server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SOT-1376: photo upload → Cloud Run upload-api service (always-warm, min-instances=1;
    # replaces the SOT-1359 gen2 upload Cloud Function). Only POST exists on
    # /api/info/{id}/attachments, so the whole path is routed statically. Regex locations are
    # matched before the /api/ prefix location below. ${UPLOAD_URL} defaults to ${BACKEND_URL}
    # when no separate upload upstream is configured.
    location ~ ^/api/info/[^/]+/attachments$ {
        proxy_pass ${UPLOAD_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${UPLOAD_HOST};
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 12m;
    }

    # SOT-1494: Self-host the Firebase Auth helper so Google sign-in popups work under
    # browser storage partitioning. start-nginx.sh writes this snippet with a
    # `location /__/` block that reverse-proxies /__/auth/ and /__/firebase/ to the real
    # ${FIREBASE_AUTH_DOMAIN} (*.firebaseapp.com) when it is configured; otherwise the
    # snippet is empty (Google sign-in simply stays unconfigured, nothing else changes).
    include /etc/nginx/snippets/firebase-auth.conf;

    # Reverse-proxy API calls to the backend Cloud Run service (same-origin → first-party cookies).
    # ${BACKEND_URL} / ${BACKEND_HOST} are substituted at container start by start-nginx.sh (envsubst).
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SOT-1384: Vite emits content-hashed assets under /assets/ (e.g. index-DeGhbBQ_.js).
    # Their names change on every build, so they are safe to cache forever (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SOT-1384: The SPA entrypoint must always be revalidated. Without an explicit
    # Cache-Control, browsers heuristically cache index.html and keep serving an old
    # bundle after a deploy (observed: PC showing a stale build while a fresh device
    # gets the new one). "no-cache" forces a conditional revalidation on every load so
    # new asset hashes are picked up immediately after redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SOT-1462: SPA client routes must fall back to index.html on hard refresh.
    # The former `$uri/` element matched real build directories whose name equals a
    # client route (e.g. the /howto route vs. the public/howto/ screenshot folder):
    # nginx served the directory, and with no directory index.html + autoindex off it
    # 301-redirected to the folder and stalled (403) instead of loading the SPA — so
    # refreshing on /howto "wouldn't open the page". Using `$uri/index.html` instead of
    # `$uri/` serves a directory only when it has its own index.html, otherwise any
    # route/directory collision cleanly falls through to the SPA entrypoint. Static
    # assets (e.g. /howto/register.png) are still served directly by the `$uri` element.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/index.html /index.html;
    }
}
