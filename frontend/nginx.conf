server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SOT-1376: photo upload → Cloud Run upload-api service (always-warm, min-instances=1;
    # replaces the SOT-1359 gen2 upload Cloud Function). Only POST exists on
    # /api/info/{id}/attachments, so the whole path is routed statically. Regex locations are
    # matched before the /api/ prefix location below. ${UPLOAD_URL} defaults to ${BACKEND_URL}
    # when no separate upload upstream is configured.
    location ~ ^/api/info/[^/]+/attachments$ {
        proxy_pass ${UPLOAD_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${UPLOAD_HOST};
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 12m;
    }

    # Reverse-proxy API calls to the backend Cloud Run service (same-origin → first-party cookies).
    # ${BACKEND_URL} / ${BACKEND_HOST} are substituted at container start by start-nginx.sh (envsubst).
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host ${BACKEND_HOST};
        proxy_ssl_server_name on;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SOT-1384: Vite emits content-hashed assets under /assets/ (e.g. index-DeGhbBQ_.js).
    # Their names change on every build, so they are safe to cache forever (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SOT-1384: The SPA entrypoint must always be revalidated. Without an explicit
    # Cache-Control, browsers heuristically cache index.html and keep serving an old
    # bundle after a deploy (observed: PC showing a stale build while a fresh device
    # gets the new one). "no-cache" forces a conditional revalidation on every load so
    # new asset hashes are picked up immediately after redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
