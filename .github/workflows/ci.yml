name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-jpn \
            poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage gate (excluding eval suites)
        run: |
          mkdir -p data
          # Eval suites run in the dedicated evaluation-gate job (SOT-1469 B1)
          # so accuracy regressions get their own required status check.
          #
          # SOT-1470 I3: coverage is visible in CI (term-missing) and guarded by a
          # regression floor (--cov-fail-under). Floor set at 70% (current TOTAL is
          # ~74%, see the "TOTAL ... %" line in this job's log). Ratchet it upward as
          # coverage improves. Coverage config: backend/.coveragerc.
          python -m pytest -q \
            --ignore=tests/test_eval_ocr.py --ignore=tests/test_eval_rag.py \
            --cov=app --cov-config=.coveragerc \
            --cov-report=term-missing --cov-fail-under=70

  # SOT-1469 B1: the OCR/RAG evaluation harness is a first-class release quality
  # gate. It runs as its own CI job (a separately-named required status check),
  # so an accuracy regression (coverage/precision/F1, groundedness, refusal)
  # fails CI on its own. Because the Deploy workflow is triggered by CI success
  # (SOT-1469 A1), a failing evaluation-gate blocks the production deploy.
  evaluation-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-jpn \
            poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Evaluation regression gate (OCR + RAG accuracy thresholds)
        run: |
          mkdir -p data
          python -m pytest -q tests/test_eval_ocr.py tests/test_eval_rag.py

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run e2e
