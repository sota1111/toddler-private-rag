name: Terraform CI

# SOT-1469 A3: static validation for the Terraform IaC under infra/terraform.
# Runs formatting, initialization (no backend/credentials), and validation on any
# change that touches the Terraform sources. `plan` needs cloud credentials and is
# intentionally left out of this gate; fmt + validate catch the common mistakes
# (drift in style, invalid references, provider/version issues) without secrets.
on:
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-ci.yml'

permissions:
  contents: read

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.8'

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate -no-color
