name: Security Scan

# SOT-1469 A4: supply-chain security checks — dependency vulnerability audits,
# a Trivy scan of dependencies + IaC misconfiguration, and SBOM generation.
#
# Gating policy:
#   - trivy-config (IaC/Dockerfile misconfig, CRITICAL) is BLOCKING.
#   - SOT-1487: dependency audits (pip-audit / npm audit) are now BLOCKING —
#     a known-vulnerable dependency fails the scan so it cannot be silently
#     carried. npm audit gates at HIGH+; pip-audit fails on any advisory.
#     Known-unfixable advisories should be triaged and added to the explicit
#     ignore list below (via pip-audit --ignore-vuln / npm audit config) rather
#     than reverting the whole job to non-blocking.
#   - the Trivy filesystem vuln scan stays reporting-only (noisier, overlaps
#     the dependency audits).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan to catch newly disclosed CVEs in unchanged deps.
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # SOT-1487: BLOCKING (staged) — fails on any advisory NOT already triaged
      # in backend/.pip-audit-ignore.txt. That file is the known backlog for the
      # pinned deps; burn it down as Dependabot (cooldown-gated) updates land, so
      # the gate tightens over time. A brand-new advisory (not in the file) fails.
      - name: pip-audit (backend, blocking)
        run: |
          python -m pip install --upgrade pip pip-audit
          IGNORES=$(grep -vE '^\s*(#|$)' backend/.pip-audit-ignore.txt \
            | sed 's/^/--ignore-vuln /' | tr '\n' ' ')
          echo "Ignoring triaged advisories: $IGNORES"
          pip-audit -r backend/requirements.txt --desc $IGNORES

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # SOT-1487: BLOCKING — fails on HIGH+ advisories.
      - name: npm audit (frontend, blocking)
        working-directory: frontend
        run: npm audit --audit-level=high

  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Trivy directly via the official script. This avoids the
      # trivy-action composite action, whose pinned transitive setup-trivy tag
      # has been unstable to resolve.
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      # Vulnerability scan of the repository (dependencies) — reporting only.
      - name: Trivy filesystem scan (vulnerabilities)
        continue-on-error: true
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 0 --quiet .

      # IaC / Dockerfile misconfiguration scan — BLOCKING on CRITICAL.
      - name: Trivy config scan (IaC misconfig, blocking)
        run: trivy config --severity CRITICAL --exit-code 1 --quiet .

  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: '**/sbom.cyclonedx.json'
          if-no-files-found: warn
