name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # ----- Backend -----
      - name: Build backend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE_BACKEND }}
        run: |
          docker build -f backend/Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" backend

      - name: Push backend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE_BACKEND }}
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy backend to Cloud Run
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE_BACKEND }}
          RUNTIME_SA: ${{ secrets.CLOUD_RUN_RUNTIME_SA }}
        run: |
          # SOT-1366 item A: adopt the least-privilege runtime SA when configured.
          SA_FLAG=""
          [ -n "$RUNTIME_SA" ] && SA_FLAG="--service-account=$RUNTIME_SA"
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_BACKEND }} \
            --image "$IMAGE:${{ github.sha }}" \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            $SA_FLAG \
            --set-secrets "AUTH_SECRET=rag-auth-secret:latest,ALLOWED_USER_EMAILS=rag-allowed-emails:latest,FIREBASE_API_KEY=rag-firebase-api-key:latest,WORKER_INVOKE_TOKEN=rag-worker-invoke-token:latest" \
            --set-env-vars "APP_ENV=production,CORS_ORIGINS=https://${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }}-${{ secrets.GCP_PROJECT_NUMBER }}.${{ secrets.GCP_REGION }}.run.app,GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=gen-lang-client-0243034020,GOOGLE_CLOUD_LOCATION=global,GEMINI_MODEL=gemini-3.5-flash,DATABASE_TYPE=firestore,STORAGE_BACKEND=gcs,GCS_BUCKET_NAME=gen-lang-client-0243034020-toddler-private-rag" \
            --memory 512Mi \
            --timeout 300 \
            --min-instances 1 \
            --max-instances 5 \
            --concurrency 40

      # ----- Upload Cloud Function (SOT-1359: gen2, slim, fast-booting, upload-only) -----
      # Replaces the former lightweight upload Cloud Run service. Source: backend/upload_function.
      - name: Deploy upload Cloud Function (gen2)
        env:
          RUNTIME_SA: ${{ secrets.CLOUD_RUN_RUNTIME_SA }}
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ secrets.CLOUD_RUN_SERVICE_BACKEND }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: backend URL not resolved" >&2
            exit 1
          fi
          # SOT-1366 item A: adopt the least-privilege runtime SA when configured.
          SA_FLAG=""
          [ -n "$RUNTIME_SA" ] && SA_FLAG="--service-account=$RUNTIME_SA"
          gcloud functions deploy ${{ secrets.CLOUD_FUNCTION_UPLOAD }} \
            --gen2 \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --runtime python311 \
            --source backend/upload_function \
            --entry-point upload_attachment \
            --trigger-http \
            --allow-unauthenticated \
            $SA_FLAG \
            --set-secrets "AUTH_SECRET=rag-auth-secret:latest,WORKER_INVOKE_TOKEN=rag-worker-invoke-token:latest" \
            --set-env-vars "APP_ENV=production,CORS_ORIGINS=https://${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }}-${{ secrets.GCP_PROJECT_NUMBER }}.${{ secrets.GCP_REGION }}.run.app,DATABASE_TYPE=firestore,STORAGE_BACKEND=gcs,GCS_BUCKET_NAME=gen-lang-client-0243034020-toddler-private-rag,GOOGLE_CLOUD_PROJECT=gen-lang-client-0243034020,AI_WORKER_URL=$BACKEND_URL" \
            --memory 256Mi \
            --timeout 60s \
            --max-instances 5

      # ----- Frontend -----
      - name: Build frontend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }}
        run: |
          docker build -f frontend/Dockerfile -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" frontend

      - name: Push frontend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }}
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy frontend to Cloud Run
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPOSITORY }}/${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }}
          FRONTEND_SA: ${{ secrets.CLOUD_RUN_FRONTEND_SA }}
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ secrets.CLOUD_RUN_SERVICE_BACKEND }} \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          if [ -z "$BACKEND_URL" ]; then
            echo "ERROR: backend URL not resolved" >&2
            exit 1
          fi
          UPLOAD_URL=$(gcloud functions describe ${{ secrets.CLOUD_FUNCTION_UPLOAD }} \
            --gen2 \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(serviceConfig.uri)')
          if [ -z "$UPLOAD_URL" ]; then
            echo "ERROR: upload function URL not resolved" >&2
            exit 1
          fi
          # SOT-1366 item A: adopt the minimal frontend SA when configured.
          SA_FLAG=""
          [ -n "$FRONTEND_SA" ] && SA_FLAG="--service-account=$FRONTEND_SA"
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_FRONTEND }} \
            --image "$IMAGE:${{ github.sha }}" \
            --region ${{ secrets.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --allow-unauthenticated \
            --clear-secrets \
            $SA_FLAG \
            --set-env-vars "BACKEND_URL=$BACKEND_URL,UPLOAD_URL=$UPLOAD_URL" \
            --memory 256Mi \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 5
